version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mathmentor-db
    restart: always
    environment:
      POSTGRES_DB: mathmentor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mathmentor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mathmentor-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mathmentor-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/mathmentor
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=uploads
      - OFFLINE_PACKAGES_DIR=offline_packages
      # - OPENAI_API_KEY=your_key_here
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/workspace/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mathmentor-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
